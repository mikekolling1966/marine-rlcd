[platformio]
default_envs = marine_rlcd

[env:marine_rlcd]
platform = espressif32@^6.9.0
board = waveshare_esp32_s3_rlcd_4_2
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++2a
    -DCORE_DEBUG_LEVEL=3
    -DLOG_LOCAL_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_USE_ARM2D=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I include
    -I src
    ; Waveshare RLCD resolution
    -DSCREEN_WIDTH=400
    -DSCREEN_HEIGHT=300
    -DLV_HOR_RES_MAX=400
    -DLV_VER_RES_MAX=300
    ; Linker wraps to intercept IDF i2c driver calls
    -Wl,--wrap=i2c_driver_install
    -Wl,--wrap=i2c_driver_delete
    -Wl,--wrap=check_i2c_driver_conflict

; RLCD board: ESP32-S3 R8N16-class memory layout (16MB flash + 8MB OPI PSRAM)
; Keep this aligned with boards/waveshare_esp32_s3_rlcd_4_2.json so we don't
; accidentally override the PSRAM line mode back to qio_qspi.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.partitions = huge_app.csv
board_build.filesystem = spiffs

lib_deps =
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson
    Links2004/WebSockets
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.2
